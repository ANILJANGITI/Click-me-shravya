<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey Shravya 😌</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.box {
    background: white;
    padding: 30px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 400px;
    text-align: center;
    position: relative;
    z-index: 2;
}

h1 {
    font-size: 18px;
    line-height: 1.5;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

.fade {
    opacity: 0;
    transform: scale(0.95);
}

.buttons {
    margin-top: 20px;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    width: 100px;
}

.yes {
    background: #4CAF50;
    color: white;
}

.no {
    background: #f44336;
    color: white;
}

/* subtle floating dots */
.particle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>
    <audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="box">
    <h1 id="question">
        Hey Shravya, do you wanna know what I am going to ask you today? 😌
    </h1>

    <div class="buttons">
        <button class="yes" onclick="yesClick()">Yes</button>
        <button class="no" onclick="noClick()">No</button>
    </div>
</div>

<script>

let stage = 0;
let noCount = 0;

function changeText(newText){
    const q = document.getElementById("question");
    q.classList.add("fade");

    setTimeout(() => {
        q.innerText = newText;
        q.classList.remove("fade");
    }, 250);
}

function yesClick() {
    if(stage === 0){
        stage = 1;
        noCount = 0;
        changeText("Cool 😎 Have you decided on getting married to me? (No 'Maybe' option today)");
    }
    else if(stage === 1){
        showFinalMessage();
    }
}

function noClick() {

    noCount++;

    if(stage === 0){
        if(noCount === 1)
            changeText("Wrong answer… try again 😏");
        else if(noCount === 2)
            changeText("Sarsarle ennenno anukuntam anni ipotaya enti? 😒 Try again.");
        else
            changeText("I'm BATMAN 🦇 I don’t give up. Try again.");
    }

    else if(stage === 1){
        if(noCount === 1)
            changeText("Ahhhh... malli naaaa 😭");
        else if(noCount === 2)
            changeText("Come on… sare teddy bear konistha 🧸");
        else
            changeText("BATMAN never gives up 😎");
    }
}

function showFinalMessage(){
    document.querySelector(".box").innerHTML = `
    <h1>
    Sweet 😌<br><br>
    Relax… I’m not officially asking you to marry me today.<br><br>
    I just wanted to wish you <b>Many More Happy Returns of the Day, Shravya 🎂✨</b><br><br>
    You deserve the best years ahead.<br><br>
    And when you finally decide…<br>
    just remember… BATMAN was consistent 😎
    </h1>
    `;
    launchConfetti();
}

function launchConfetti(){
    for(let i=0; i<120; i++){
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor =
            "hsl(" + Math.random() * 360 + ", 100%, 50%)";
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(c);
    }
}

/* floating particles */
setInterval(() => {
    let p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 10000);
}, 400);

</script>

</body>
</html>
